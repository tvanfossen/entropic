# SPDX-License-Identifier: LGPL-3.0-or-later
name: Release — Python wheel to PyPI

# Fires when the maintainer publishes a GitHub Release (after the local
# CUDA + CPU tarball build and `gh release create`). The pure-Python
# wrapper wheel is built on a hosted runner and pushed to PyPI via the
# OIDC trusted-publisher relationship configured at PyPI side.
#
# Sequencing: native tarballs MUST be uploaded by `gh release create`
# first, because the wrapper's `entropic install-engine` subcommand
# fetches them from the matching release. The release-published event
# guarantees this ordering — the workflow only fires once the release
# (with assets) is live.
#
# Tarball/native release stays manual (see docs/releasing.md). Only the
# pure-Python wheel uses CI; it has no CUDA dependency and runs trivially
# on the free 2-core runner.

on:
  release:
    types: [published]
  # v2.1.2: allow manual re-trigger so a transient publish failure
  # (e.g. CI version-extraction bug, OIDC blip) can be re-run against
  # the same release without deleting + recreating it. Reads the
  # release tag from the input.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v2.1.2)"
        required: true
        type: string

jobs:
  publish:
    name: Build wheel + publish to PyPI
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write   # required by pypa/gh-action-pypi-publish OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # On a release event the tag is github.event.release.tag_name;
          # on a manual workflow_dispatch the user supplies it.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install --upgrade build

      - name: Verify VERSION file matches release tag
        # v2.1.2 single-VERSION refactor: ``pyproject.toml`` no longer
        # carries a literal version (it declares ``dynamic = ["version"]``
        # and reads from the repo-root VERSION file). The CI assertion
        # therefore reads VERSION directly — same single source CMake,
        # the wheel, doxygen, and the runtime version test all use.
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          TAG="${TAG#v}"
          VERSION_FILE=$(cat VERSION | tr -d '[:space:]')
          echo "tag:     $TAG"
          echo "VERSION: $VERSION_FILE"
          if [[ "$TAG" != "$VERSION_FILE" ]]; then
            echo "::error::release tag ($TAG) does not match VERSION file ($VERSION_FILE)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
