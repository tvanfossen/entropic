# Entropic Default Configuration
# This file ships with entropic-engine as a bundled default.
# Hardware params only — inference behavior lives in identity frontmatter.

models:
  # Primary workhorse tier — conversational, code, planning
  conversational:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  planner:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  code_writer:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  code_validator:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  test_writer:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  # 35B tier — benchmark-validated upgrades from 9B
  searcher:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  design_validator:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  tool_runner:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  pruner:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: 40

  # Mid-tier — 9B for roles where quality matches 35B
  diagnoser:
    path: ~/models/gguf/Qwen3.5-9B-Q8_0.gguf
    adapter: qwen35
    context_length: 16384
    gpu_layers: -1

  wireframer:
    path: ~/models/gguf/Qwen3.5-9B-Q8_0.gguf
    adapter: qwen35
    context_length: 16384
    gpu_layers: -1

  # Lightweight tier — 4B for roles where quality matches 35B
  quick:
    path: ~/models/gguf/Qwen3.5-4B-Q8_0.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: -1

  compactor:
    path: ~/models/gguf/Qwen3.5-4B-Q8_0.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: -1

  extractor:
    path: ~/models/gguf/Qwen3.5-4B-Q8_0.gguf
    adapter: qwen35
    context_length: 8192
    gpu_layers: -1

  # Classification router — always loaded, never swapped out
  router:
    path: ~/models/gguf/Qwen3-0.6B-Q8_0.gguf
    adapter: router
    context_length: 2048
    gpu_layers: -1

  default: conversational

routing:
  enabled: true
  fallback_tier: conversational

log_level: INFO

# MCP configuration
mcp:
  enable_filesystem: true
  enable_bash: true
  enable_git: true
  enable_diagnostics: true
  enable_web: true

  filesystem:
    allow_outside_root: true

  # External MCP server for Claude Code integration
  external:
    enabled: false
    rate_limit: 10

# Voice interface configuration (NVIDIA PersonaPlex)
voice:
  enabled: false

  model:
    hf_repo: "nvidia/personaplex-7b-v1"

  runtime:
    device: "cuda"
    quantization: "int8"
    context_window: 500

  sampling:
    text_temperature: 0.8
    audio_temperature: 0.8
    top_k: 250

  voice_prompt:
    prompt_dir: "~/.entropic/voices"
    voice_name: "NATF2"
    thinking_audio: "thinking_moment.wav"

  conversation:
    window_duration: 15.0
    initial_prompt: "You are a helpful coding assistant."

  secondary_model:
    model_path: ~/models/gguf/Qwen3.5-0.8B-Q8_0.gguf
    max_tokens: 300
    temperature: 0.3

  server:
    host: "127.0.0.1"
    port: 8765
    auto_start: true
    startup_timeout_seconds: 600
