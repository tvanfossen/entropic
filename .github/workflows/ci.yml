name: CI

# PR + push checks on develop/main.
#
# Three parallel jobs:
#   1. pre-commit — linters + build + unit tests (SKIP coverage hook;
#      coverage runs as a separate parallel build to avoid doubling
#      the build time).
#   2. coverage — full coverage-preset build + gcovr per-library check.
#   3. distribution-smoke — find_package consumer + CLI RPATH check.
#
# All on GitHub-hosted ubuntu-24.04 (free 2-core). Transitioning to a
# Docker-based self-hosted runner is planned for better build times.
#
# Model tests do not run in CI — developer-run at x.y.0 bumps per
# docs/architecture-cpp.md §Test Gating.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit (knots, flake8, doxygen-guard, build, tests)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          ccache-key: cpu

      - name: Run pre-commit (skip coverage — runs in parallel job)
        env:
          SKIP: coverage-check
        run: .venv/bin/pre-commit run --all-files --show-diff-on-failure

      - name: ccache stats (post-build)
        if: always()
        run: ccache --show-stats

  coverage:
    name: Per-library coverage (gcovr)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          ccache-key: coverage

      - name: Run coverage check
        run: .venv/bin/pre-commit run coverage-check --all-files

      - name: ccache stats (post-build)
        if: always()
        run: ccache --show-stats

      - name: Upload per-library coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/test-reports/coverage/
          if-no-files-found: ignore

  distribution-smoke:
    name: Distribution smoke (find_package + CLI RPATH)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          ccache-key: cpu

      - name: Run scripts/smoke_distribution.sh
        run: scripts/smoke_distribution.sh
