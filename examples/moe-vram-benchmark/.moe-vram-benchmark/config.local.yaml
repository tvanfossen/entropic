# MoE VRAM Benchmark — validation for P1-20260226-022
#
# Tests tier switching, load times, inference speed, quality lossiness,
# and GPU layer optimization across dense (8B) and MoE (35B-A3B) models
# at different quantization levels.
#
# max_output_tokens kept low — this is a benchmark, not a chat session.
# Runaway generation at 2 tok/s on partial GPU offload is unacceptable.

app_context: prompts/app_context.md

models:
  tiers:
    normal:
      path: ~/models/gguf/Qwen3-8B-Q4_K_M.gguf
      adapter: qwen3
      context_length: 8192
      max_output_tokens: 256
      gpu_layers: -1
    thinking_q4:
      path: ~/models/gguf/Qwen3.5-35B-A3B-Q4_K_M.gguf
      adapter: qwen3
      context_length: 8192
      max_output_tokens: 256
      gpu_layers: 25
      enable_thinking: false
    thinking_q2:
      path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
      adapter: qwen3
      context_length: 8192
      max_output_tokens: 256
      gpu_layers: 40
      enable_thinking: false
  router:
    path: ~/models/gguf/Qwen3-0.6B-Q8_0.gguf
    adapter: router
    context_length: 2048
  default: normal

routing:
  enabled: true
  fallback_tier: normal
  tier_map:
    "1": normal
    "2": thinking_q4

mcp:
  enable_filesystem: false
  enable_bash: false
  enable_git: false
  enable_diagnostics: false
