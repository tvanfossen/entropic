# MoE VRAM Benchmark — validation for P1-20260226-022
#
# Tests tier switching, load times, inference speed, quality lossiness,
# and GPU layer optimization across dense (8B) and MoE (35B-A3B) models
# at different quantization levels.
#
# Tier names are benchmark-specific (not identity-based) — this consumer
# defines its own tiers for measurement purposes.

app_context: prompts/app_context.md

models:
  tiers:
    dense_8b:
      path: ~/models/gguf/Qwen3.5-9B-Q8_0.gguf
      adapter: qwen35
      context_length: 8192
    moe_q4:
      path: ~/models/gguf/Qwen3.5-35B-A3B-Q4_K_M.gguf
      adapter: qwen35
      context_length: 8192
      gpu_layers: 25
    moe_q2:
      path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
      adapter: qwen35
      context_length: 8192
  router:
    path: ~/models/gguf/Qwen3-0.6B-Q8_0.gguf
    adapter: router
    context_length: 2048
  default: dense_8b

routing:
  enabled: true
  fallback_tier: dense_8b
  tier_map:
    "1": dense_8b
    "2": moe_q4

mcp:
  enable_filesystem: false
  enable_bash: false
  enable_git: false
  enable_diagnostics: false
