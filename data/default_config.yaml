# Entropic Default Configuration
# Bundled with the C++ engine. Fallback when no global/project config exists.
# Hardware params only — inference behavior lives in identity frontmatter.

models:
  lead:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40
    # gh#42 (v2.1.8): primary is multimodal — pair the bundled mmproj
    # so the lead tier (which is also the default per `default: lead`)
    # carries vision capability. Other tiers continue to share the same
    # base model weights via the orchestrator's model pool — no extra
    # VRAM cost beyond the single mmproj (~0.9 GB).
    mmproj: primary_mmproj
    capabilities: [text, vision]

  arch:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  eng:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  qa:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  ux:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  ui:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  analyst:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  compactor:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  scribe:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  benchmark_judge:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  default: lead

routing:
  enabled: false
  fallback_tier: lead

log_level: INFO

mcp:
  enable_filesystem: true
  enable_bash: true
  enable_git: true
  enable_diagnostics: true
  enable_web: true
  filesystem:
    allow_outside_root: true
  external:
    enabled: false
    rate_limit: 10
