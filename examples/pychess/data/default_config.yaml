# PyChess Configuration
# This file seeds .pychess/config.local.yaml on first run.
# Edit the model paths below if needed, then re-run main.py.

constitution: prompts/constitution.md

models:
  # Thinker tier: fast analysis + strategic planning
  thinker:
    path: primary
    adapter: qwen35
    identity: prompts/identity_thinker.md
    grammar: data/grammars/chess_thinker.gbnf
    context_length: 8192
    auto_chain: true
    allowed_tools:
      - entropic.handoff

  # Executor tier: action-only with small token budget
  executor:
    path: lightweight
    adapter: qwen35
    identity: prompts/identity_executor.md
    grammar: data/grammars/chess_executor.gbnf
    context_length: 8192
    allowed_tools:
      - chess.make_move

  default: thinker

# Routing disabled — auto_chain handles thinker→executor handoff.
routing:
  enabled: false
  fallback_tier: thinker
  handoff_rules:
    thinker: [executor]

# MCP: disable all built-in servers.
# Only the ChessServer is registered programmatically.
mcp:
  enable_filesystem: false
  enable_bash: false
  enable_git: false
  enable_diagnostics: false

# LSP: no code editing, no diagnostics needed.
lsp:
  enabled: false

log_level: INFO
log_dir: .pychess
