fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(test-reports/|vendor/)
      - id: end-of-file-fixer
        exclude: ^(test-reports/|vendor/)
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-cognitive-complexity
          - flake8-functions
        args:
          - '--max-cognitive-complexity=15'
          - '--max-returns-amount=3'
          - '--max-line-length=100'
          - '--ignore=E501,W503,E203,E704'

  - repo: https://github.com/brandon-arrendondo/knots
    rev: 1.0.0
    hooks:
      - id: knots
        args:
          - --cognitive-threshold=15
          - --mccabe-threshold=15
          - --nesting-threshold=4
          - --sloc-threshold=50
          - --abc-threshold=10.0
          - --return-threshold=3
        exclude: ^extern/

  - repo: https://github.com/tvanfossen/doxygen-guard
    rev: main
    hooks:
      - id: doxygen-guard
        files: \.(h|hpp|c|cpp|cc|cxx)$
        exclude: ^extern/
