fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      # ruff lint config lives here, not pyproject.toml — pre-commit
      # is the source of truth for hooks. Adjust here if rules change.
      - id: ruff
        args:
          - --fix
          - --line-length=100
          - --select=E,F,W,I,N,UP,B,C4
          - --ignore=E501
          - --extend-exclude=vendor
      - id: ruff-format
        args:
          - --line-length=100
          - --exclude=vendor

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-cognitive-complexity
          - flake8-functions
        args:
          - '--max-cognitive-complexity=15'
          - '--max-returns-amount=3'
          - '--max-line-length=100'
          - '--ignore=E501,W503,E203,E704,E266'

  - repo: https://github.com/brandon-arrendondo/knots
    rev: v1.1.0
    hooks:
      - id: knots
        args:
          - --cognitive-threshold=15
          - --mccabe-threshold=15
          - --nesting-threshold=4
          - --sloc-threshold=50
          - --abc-threshold=10.0
          - --return-threshold=3
        exclude: ^extern/

  - repo: https://github.com/tvanfossen/doxygen-guard
    rev: main
    hooks:
      - id: doxygen-guard
        files: \.(h|hpp|c|cpp|cc|cxx|py)$
        exclude: ^(extern/|tests/|build/|\.build/|\.old/|\.venv/)

  # ── Build & Test Gates ──────────────────────────────
  - repo: local
    hooks:
      - id: build
        name: Build (inv build --cpu)
        entry: .venv/bin/inv build --cpu
        language: system
        always_run: true
        pass_filenames: false

      - id: unit-tests
        name: Unit tests (inv test --cpu)
        entry: .venv/bin/inv test --cpu --no-build
        language: system
        always_run: true
        pass_filenames: false

      - id: coverage-check
        name: Per-library coverage (gcovr)
        # Per-library minimum line-coverage thresholds for librentropic
        # sub-targets. Format: "name:source_filter:percent". Adjust
        # numbers here, not in tasks.py — pre-commit-config.yaml is the
        # source of truth for hook gates.
        entry: .venv/bin/inv check-coverage
        language: system
        always_run: true
        pass_filenames: false
        args:
          - '--threshold'
          - 'librentropic-types:src/types/:95'
          - '--threshold'
          - 'librentropic-config:src/config/:90'
          - '--threshold'
          - 'librentropic-core:src/core/:85'
          - '--threshold'
          - 'librentropic-mcp:src/mcp/:85'
          - '--threshold'
          - 'librentropic-storage:src/storage/:85'
          - '--threshold'
          - 'librentropic-inference:src/inference/:70'
          - '--threshold'
          - 'librentropic-facade:src/facade/:80'
