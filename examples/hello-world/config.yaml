# Hello World — minimal entropic consumer config.
#
# Single-tier example using the bundled lead identity.
# No routing — just one model, one identity, streaming output.
#
# Uses Qwen3.5-35B-A3B MoE (Q2_K) — full GPU offload at 16GB VRAM,
# 30-41 tok/s. MoE architecture: 35B total params, ~3B active per token.
#
# Edit `path` to point to your GGUF model file.
# See docs/library-consumer-guide.md for full config reference.

# App context: consumer-specific personality injected into every prompt
app_context: prompts/app_context.md

models:
  tiers:
    lead:
      path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
      adapter: qwen35
      context_length: 16384
  default: lead

routing:
  enabled: false
  fallback_tier: lead

mcp:
  enable_filesystem: false
  enable_bash: false
  enable_git: false
  enable_diagnostics: false

lsp:
  enabled: false
