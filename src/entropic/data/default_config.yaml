# Entropic Default Configuration
# This file ships with entropic-engine as a bundled default.
# Hardware params only — inference behavior lives in identity frontmatter.

models:
  # Single model serves all roles — maximize VRAM for KV cache
  lead:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  arch:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  eng:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  qa:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  ux:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  ui:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  analyst:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  compactor:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  scribe:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  benchmark_judge:
    path: ~/models/gguf/Qwen3.5-35B-A3B-Q2_K.gguf
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40

  default: lead

routing:
  enabled: false
  fallback_tier: lead

log_level: INFO

# MCP configuration
mcp:
  enable_filesystem: true
  enable_bash: true
  enable_git: true
  enable_diagnostics: true
  enable_web: true

  filesystem:
    allow_outside_root: true

  # External MCP server for Claude Code integration
  external:
    enabled: false
    rate_limit: 10

# Voice interface configuration (NVIDIA PersonaPlex)
voice:
  enabled: false

  model:
    hf_repo: "nvidia/personaplex-7b-v1"

  runtime:
    device: "cuda"
    quantization: "int8"
    context_window: 500

  sampling:
    text_temperature: 0.8
    audio_temperature: 0.8
    top_k: 250

  voice_prompt:
    prompt_dir: "~/.entropic/voices"
    voice_name: "NATF2"
    thinking_audio: "thinking_moment.wav"

  conversation:
    window_duration: 15.0
    initial_prompt: "You are a helpful coding assistant."

  secondary_model:
    model_path: ~/models/gguf/Qwen3.5-0.8B-Q8_0.gguf
    max_tokens: 300
    temperature: 0.3

  server:
    host: "127.0.0.1"
    port: 8765
    auto_start: true
    startup_timeout_seconds: 600
