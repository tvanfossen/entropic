  # 16 GB GPU with KV + compute headroom at 4 K context, whereas the
  # Q8_0 entry (7.8 GB) lands a partial CPU split there. Unsloth does
  # not publish a UD-IQ4_XS for E4B (the A4B sibling uses that quant);
  # UD-Q4_K_XL is the equivalent dynamic 4-bit option here.
