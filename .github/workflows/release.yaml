name: Release

# Tag-driven release pipeline.
#
# Fired on any tag matching v* (e.g., v2.0.5, v2.0.5-rc1). Validates the
# tag matches CMakeLists.txt project VERSION, builds each target in the
# backend matrix, packages a .tar.gz per matrix entry, runs the
# distribution smoke test against each staged install, and attaches all
# tarballs to a GitHub Release.
#
# Python wheel publishing (PyPI via OIDC, scikit-build-core + cibuildwheel)
# is deliberately NOT wired up in this workflow yet — that lands in the
# Phase 3b follow-on, gated on local wheel validation. Consumers who
# want a Python package today fetch the tar.gz and use find_package from
# C++ or the ctypes wrapper pointing at the installed librentropic.so.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # for creating the GitHub Release
  id-token: write   # reserved for Phase 3b PyPI OIDC

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Sanity: tag matches CMakeLists.txt project VERSION.
  # Catches the "tagged v2.0.5 but forgot to bump CMake VERSION" class
  # of mistakes before any expensive build runs.
  # ──────────────────────────────────────────────────────────────────
  validate-tag:
    name: Validate tag matches CMakeLists VERSION
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        name: Extract tag + CMake VERSION, assert match
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          CMAKE_VERSION=$(sed -n 's/.*VERSION \([0-9][0-9A-Za-z.\-]*\).*/\1/p' CMakeLists.txt | head -1)
          echo "tag version:  $TAG"
          echo "cmake version: $CMAKE_VERSION"
          # Allow release-candidate suffix on the tag ("-rc1" etc.) without
          # requiring it in CMakeLists.txt.
          TAG_BASE="${TAG%%-*}"
          if [[ "$TAG_BASE" != "$CMAKE_VERSION" ]]; then
            echo "::error::tag base ($TAG_BASE) does not match CMakeLists.txt VERSION ($CMAKE_VERSION)"
            exit 1
          fi
          echo "version=$TAG" >>"$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────
  # Backend matrix — both entries on GitHub-hosted ubuntu-24.04.
  #
  # The CUDA entry installs NVIDIA's CUDA toolkit via apt; no physical
  # GPU is needed to *build* CUDA artifacts — nvcc cross-compiles to
  # target architectures (compute_70/75/80/86/89/90). The post-install
  # smoke test is limited to non-CUDA-runtime ops (version query,
  # link-check) since the hosted runner can't execute CUDA code.
  #
  # Model tests are developer-run (x.y.0 gate per
  # docs/architecture-cpp.md) — never in CI.
  # ──────────────────────────────────────────────────────────────────
  build-package:
    name: Build + package (${{ matrix.backend }})
    needs: validate-tag
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cpu
            install_cuda: "false"
            cmake_flags: >-
              -DENTROPIC_CPU_ONLY=ON
              -DENTROPIC_CUDA=OFF
              -DENTROPIC_SHARED=ON
              -DENTROPIC_STATIC=OFF
              -DENTROPIC_BUILD_TESTS=OFF
          - backend: cuda
            install_cuda: "true"
            cmake_flags: >-
              -DENTROPIC_CUDA=ON
              -DENTROPIC_CPU_ONLY=OFF
              -DENTROPIC_SHARED=ON
              -DENTROPIC_STATIC=OFF
              -DENTROPIC_BUILD_TESTS=OFF

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          install-cuda: ${{ matrix.install_cuda }}

      - name: Configure
        run: |
          cmake -B build/release -S . \
            ${{ matrix.cmake_flags }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=stage/entropic

      - name: Build
        run: cmake --build build/release --parallel

      - name: Install into staging prefix
        run: cmake --install build/release

      - name: Post-install smoke (find_package + CLI launch)
        run: |
          set -euo pipefail
          # Reuse packaging/smoke-consumer without rebuilding entropic.
          rm -rf build/release/consumer
          cmake -B build/release/consumer -S packaging/smoke-consumer \
            -Dentropic_DIR="$PWD/stage/entropic/lib/cmake/entropic"
          cmake --build build/release/consumer
          build/release/consumer/entropic-smoke
          stage/entropic/bin/entropic version

      - name: Package tar.gz
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-tag.outputs.version }}"
          ARTIFACT="entropic-${VERSION}-linux-x86_64-${{ matrix.backend }}.tar.gz"
          # Tar from inside stage/ so the archive extracts to ./entropic/…
          tar -C stage -czf "$ARTIFACT" entropic
          sha256sum "$ARTIFACT" >"$ARTIFACT.sha256"
          ls -lh "$ARTIFACT"*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropic-${{ matrix.backend }}
          path: |
            entropic-*.tar.gz
            entropic-*.tar.gz.sha256

  # ──────────────────────────────────────────────────────────────────
  # Collect all matrix artifacts and publish one GitHub Release.
  # Failure of any build-package job aborts publish (default needs:
  # semantics — we don't want partial releases).
  # ──────────────────────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    needs: [validate-tag, build-package]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/entropic-*.tar.gz
            artifacts/entropic-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark RCs as prerelease so pip and consumers don't auto-upgrade.
          prerelease: ${{ contains(needs.validate-tag.outputs.version, '-') }}

  # ──────────────────────────────────────────────────────────────────
  # Build the PyPI wheel from the same CPU tarball that was just
  # published to GitHub Release. One binary, two channels — `pip
  # install entropic-engine` delivers the exact librentropic.so bytes
  # that `install.sh --cpu` would have extracted.
  #
  # CUDA wheel is not published to PyPI yet — the conventional pattern
  # is a separate distribution name (entropic-engine-cuda) that isn't
  # registered. CUDA consumers use install.sh --cuda for now.
  # ──────────────────────────────────────────────────────────────────
  build-wheel:
    name: Build PyPI wheel (CPU)
    needs: [validate-tag, build-package, github-release]
    runs-on: ubuntu-24.04
    outputs:
      wheel_name: ${{ steps.pack.outputs.wheel_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download CPU tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: entropic-cpu
          path: tarball

      - id: pack
        name: Repackage tarball as wheel
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-tag.outputs.version }}"
          BARE="${VERSION#v}"
          TARBALL="tarball/entropic-${BARE}-linux-x86_64-cpu.tar.gz"
          python3 scripts/pack_wheel.py \
            --tarball "$TARBALL" \
            --version "$BARE" \
            --platform-tag linux_x86_64 \
            --outdir dist
          WHEEL=$(ls dist/entropic_engine-*.whl)
          echo "wheel_name=$(basename "$WHEEL")" >>"$GITHUB_OUTPUT"
          ls -lh "$WHEEL"

      - name: Smoke-install the wheel and import
        # Catches "wheel builds but doesn't import" regressions before
        # we push to PyPI (where yanking is painful).
        run: |
          set -euo pipefail
          python3 -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/entropic_engine-*.whl
          /tmp/smoke-venv/bin/python -c "import entropic; assert entropic._get_lib() is not None"
          /tmp/smoke-venv/bin/entropic --help >/dev/null

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: entropic-wheel
          path: dist/entropic_engine-*.whl

  # ──────────────────────────────────────────────────────────────────
  # PyPI trusted publishing via OIDC. Uploads the wheel only — no
  # sdist (source distribution). The distribution model is binary
  # tarball → wheel re-pack; building from source via `pip install`
  # would require scikit-build-core integration we don't ship.
  #
  # RC tags (e.g., v2.0.5-rc1) skip this job so we never clutter PyPI
  # with prereleases; developers pip-install RCs from the GitHub
  # Release tarball via install.sh.
  # ──────────────────────────────────────────────────────────────────
  pypi-publish:
    name: Publish to PyPI
    needs: [validate-tag, build-wheel]
    if: ${{ !contains(needs.validate-tag.outputs.version, '-') }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write   # OIDC trusted publishing (configured on PyPI
                        # for tvanfossen/entropic since v1.7.1; keeping
                        # the workflow filename `release.yaml` preserves
                        # that config — no environment: block, matching
                        # v1.7.1).
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: entropic-wheel
          path: dist

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # skip-existing so re-running the workflow against an existing
          # tag doesn't fail if PyPI already has the wheel.
          skip-existing: true
