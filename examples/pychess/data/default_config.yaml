# PyChess Configuration
# This file seeds .pychess/config.local.yaml on first run.
# Edit the model paths below if needed, then re-run main.py.

models:
  tiers:
    # Thinker tier: deep analysis with large token budget (thinking ON)
    thinker:
      path: ~/models/gguf/Qwen3-8B-Q4_K_M.gguf
      adapter: qwen3
      context_length: 8192
      max_output_tokens: 2048
      temperature: 0.6
      auto_chain: true
      allowed_tools:
        - chess.make_move
        - entropic.todo_write

    # Executor tier: action-only with small budget (/no-think)
    executor:
      path: ~/models/gguf/Qwen3-8B-Q4_K_M.gguf
      adapter: qwen3
      context_length: 8192
      max_output_tokens: 256
      temperature: 0.1
      enable_thinking: false
      allowed_tools:
        - chess.make_move

  default: thinker

# Routing disabled — auto_chain handles thinker→executor handoff.
routing:
  enabled: false
  fallback_tier: thinker
  handoff_rules:
    thinker: [executor]

# MCP: disable all built-in servers.
# Only the ChessServer is registered programmatically.
mcp:
  enable_filesystem: false
  enable_bash: false
  enable_git: false
  enable_diagnostics: false

# LSP: no code editing, no diagnostics needed.
lsp:
  enabled: false

log_level: INFO
