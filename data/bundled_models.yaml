# SPDX-License-Identifier: Apache-2.0
# Bundled model registry — single source of truth for download URLs and default paths.
# Referenced by cli_download.py and default_config.yaml.
# Update this file when switching models or quantizations.
#
# ── Naming convention (v2.1.9, gh#44) ─────────────────────────
# Model entries use <family>_<size_or_variant>, lowercase, underscores:
#   qwen3_5_9b, qwen3_6_a3b, gemma4_e2b, nemotron3_nano_4b
# Tier role keys (primary, mid, lightweight, draft, router, …) are a
# separate concern — they assign a model entry to a runtime role.
# Tier swapping is a config edit; the registry just lists models.
#
# Existing role-keyed entries (primary, primary_mmproj, mid,
# lightweight) are preserved for backward compatibility. New work
# should reference the model-keyed entries.
#
# ── License footprint ─────────────────────────────────────────
# Engine: Apache-2.0.
# Model GGUFs are runtime data, not linked code — model licenses do
# not bind the engine, but redistributors of bundled weights should
# review per-entry license fields below before shipping.
# Per-family terms:
#   Qwen 3.5 / 3.6      → Apache-2.0           (permissive)
#   Gemma 4             → Gemma Terms of Use   (restrictive — review)
#   Nemotron 3          → NVIDIA Open Model License (review)
#
# ── Quant rationale ───────────────────────────────────────────
# Single-GPU dev target, one model at a time. Quant choices balance
# VRAM footprint against quality. UD-IQ3_XXS is reserved for 35B-A3B
# class MoE; Q8_0 is the default for ≤ 9B; Q4_K_M is the fallback for
# 20B+ dense without UD quants available.

# ══════════════════════════════════════════════════════════════
# Role-keyed entries (preserved from v2.1.8 — do not break existing
# configs that reference these directly)
# ══════════════════════════════════════════════════════════════

primary:
  name: Qwen3.5-35B-A3B-UD-IQ3_XXS
  url: https://huggingface.co/unsloth/Qwen3.5-35B-A3B-GGUF/resolve/main/Qwen3.5-35B-A3B-UD-IQ3_XXS.gguf
  size_gb: 13.1
  adapter: qwen35
  description: Primary workhorse — all roles (single model architecture)
  # gh#42 (v2.1.8): Qwen3.5-35B-A3B is tagged image-text-to-text upstream
  # (vision encoder + paired mmproj). Bundling the F16 mmproj turns the
  # primary tier into a VLM without a separate VL model bundle. Consumers
  # that want text-only can override `mmproj: ""` in their tier config.
  mmproj_key: primary_mmproj

primary_mmproj:
  name: mmproj-F16
  url: https://huggingface.co/unsloth/Qwen3.5-35B-A3B-GGUF/resolve/main/mmproj-F16.gguf
  size_gb: 0.9
  description: Vision projector paired with primary (Qwen3.5-35B-A3B, F16)

