# SPDX-License-Identifier: LGPL-3.0-or-later
name: Release

# Tag-driven release pipeline.
#
# Fired on any tag matching v* (e.g., v2.0.5, v2.0.5-rc1). Validates the
# tag matches CMakeLists.txt project VERSION, builds each target in the
# backend matrix, packages a .tar.gz per matrix entry, runs the
# distribution smoke test against each staged install, and attaches all
# tarballs to a GitHub Release.
#
# Python wheel publishing (PyPI via OIDC, scikit-build-core + cibuildwheel)
# is deliberately NOT wired up in this workflow yet — that lands in the
# Phase 3b follow-on, gated on local wheel validation. Consumers who
# want a Python package today fetch the tar.gz and use find_package from
# C++ or the ctypes wrapper pointing at the installed librentropic.so.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # for creating the GitHub Release

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Sanity: tag matches CMakeLists.txt project VERSION.
  # Catches the "tagged v2.0.5 but forgot to bump CMake VERSION" class
  # of mistakes before any expensive build runs.
  # ──────────────────────────────────────────────────────────────────
  validate-tag:
    name: Validate tag matches CMakeLists VERSION
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        name: Extract tag + CMake VERSION, assert match
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          # Grab an X.Y.Z triple — rules out cmake_minimum_required(VERSION 3.21)
          # (only two components) and hits the project()'s VERSION 2.0.5.
          CMAKE_VERSION=$(grep -oE 'VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt \
                            | head -1 | awk '{print $2}')
          echo "tag version:   $TAG"
          echo "cmake version: $CMAKE_VERSION"
          # Allow release-candidate suffix on the tag ("-rc1" etc.) without
          # requiring it in CMakeLists.txt.
          TAG_BASE="${TAG%%-*}"
          if [[ "$TAG_BASE" != "$CMAKE_VERSION" ]]; then
            echo "::error::tag base ($TAG_BASE) does not match CMakeLists.txt VERSION ($CMAKE_VERSION)"
            exit 1
          fi
          echo "version=$TAG" >>"$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────
  # Backend matrix — both entries on GitHub-hosted ubuntu-24.04
  # (2 vCPU / 16 GB RAM / 14 GB disk, standard free-tier). The
  # setup-entropic composite action frees ~30 GB of unused
  # pre-installed toolchains and installs ccache so repeat runs
  # don't rebuild llama.cpp from scratch.
  #
  # The CUDA entry installs only the nvcc + libraries subset of the
  # CUDA toolkit (no Nsight profilers) and restricts device code to
  # `compute_80;86;89;90` — modern Ampere/Ada/Hopper only. This cuts
  # kernel count ~6× vs. the llama.cpp default, which is what made
  # earlier attempts OOM the hosted runner.
  #
  # Post-install smoke is limited to non-CUDA-runtime ops (version
  # query, link-check) since the hosted runner has no GPU.
  # Model tests are developer-run (x.y.0 gate per
  # docs/architecture-cpp.md) — never in CI.
  # ──────────────────────────────────────────────────────────────────
  build-package:
    name: Build + package (${{ matrix.backend }})
    needs: validate-tag
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU build stays on the free 2-core runner — small artifact
          # (~4 MB), fast build with ccache, no CUDA toolkit overhead.
          - backend: cpu
            runner: ubuntu-24.04
            install_cuda: "false"
            cmake_flags: >-
              -DENTROPIC_CPU_ONLY=ON
              -DENTROPIC_CUDA=OFF
              -DENTROPIC_SHARED=ON
              -DENTROPIC_STATIC=OFF
              -DENTROPIC_BUILD_TESTS=OFF
          # CUDA build uses the paid 8-core runner (32 GB RAM, ~300 GB
          # disk). The 2-core runner can't fit CUDA toolkit + nvcc
          # multi-arch kernel compilation in its disk/memory envelope.
          # Estimated cost: ~15 min × $0.032 = ~$0.50 per release.
          #
          # CMAKE_CUDA_ARCHITECTURES is passed separately in the
          # Configure step (the `;` in a cmake list gets interpreted as
          # a bash command separator if inlined into a folded-block var).
          - backend: cuda
            runner: ubuntu-24.04-8-cores
            install_cuda: "true"
            cmake_flags: >-
              -DENTROPIC_CUDA=ON
              -DENTROPIC_CPU_ONLY=OFF
              -DENTROPIC_SHARED=ON
              -DENTROPIC_STATIC=OFF
              -DENTROPIC_BUILD_TESTS=OFF
            # Comprehensive arch coverage — every discrete NVIDIA GPU
            # generation from Maxwell onward gets native SASS + PTX.
            # Skipping only the Jetson/embedded variants (sm_53/62/72/87).
            #
            #   50, 52  Maxwell   GTX 9xx, Titan X (Maxwell)
            #   60, 61  Pascal    GTX 10-series, P40/P100
            #   70      Volta     Titan V, V100
            #   75      Turing    RTX 20-series, T4
            #   80      Ampere DC A100
            #   86      Ampere    RTX 30-series, A40
            #   89      Ada       RTX 40-series, L40
            #   90      Hopper    H100, H200
            #   100     Blackwell DC  B100, B200
            #   120     Blackwell     RTX PRO 4000, RTX 50-series
            #
            # Requires CUDA toolkit >= 12.8 for sm_100/sm_120.
            # Build takes ~20-30 min on 8-core runner (vs ~10 with the
            # narrower list) — acceptable since it's paid compute and
            # runs once per release.
            cuda_archs: "50;52;60;61;70;75;80;86;89;90;100;120"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          install-cuda: ${{ matrix.install_cuda }}
          ccache-key: ${{ matrix.backend }}

      - name: Configure
        # CMAKE_<LANG>_COMPILER_LAUNCHER=ccache prepends ccache to every
        # compile invocation; per-project cache hit rate is ~95% on
        # llama.cpp once the submodule SHA is stable.
        #
        # CUDA_ARCHS must be quoted because its value contains `;`
        # (cmake list separator) that bash would otherwise split.
        env:
          CUDA_ARCHS: ${{ matrix.cuda_archs }}
        run: |
          extra=()
          if [[ -n "${CUDA_ARCHS:-}" ]]; then
            extra+=("-DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCHS}")
          fi
          cmake -B build/release -S . \
            ${{ matrix.cmake_flags }} \
            "${extra[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=stage/entropic \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache

      - name: Build
        # Let cmake auto-detect parallelism from nproc. On the 2-core
        # CPU runner that's 2 (safe). On the 8-core CUDA runner that's
        # 8, and its 32 GB RAM absorbs llama.cpp's CUDA link peak
        # (~8-10 GB RSS) without oversubscription.
        run: cmake --build build/release --parallel

      - name: ccache stats (post-build)
        if: always()
        run: ccache --show-stats

      - name: Install into staging prefix
        run: cmake --install build/release

      - name: Post-install smoke (find_package + CLI launch)
        run: |
          set -euo pipefail
          # Reuse packaging/smoke-consumer without rebuilding entropic.
          rm -rf build/release/consumer
          cmake -B build/release/consumer -S packaging/smoke-consumer \
            -Dentropic_DIR="$PWD/stage/entropic/lib/cmake/entropic"
          cmake --build build/release/consumer
          build/release/consumer/entropic-smoke
          stage/entropic/bin/entropic version

      - name: Package tar.gz
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-tag.outputs.version }}"
          ARTIFACT="entropic-${VERSION}-linux-x86_64-${{ matrix.backend }}.tar.gz"
          # Tar from inside stage/ so the archive extracts to ./entropic/…
          tar -C stage -czf "$ARTIFACT" entropic
          sha256sum "$ARTIFACT" >"$ARTIFACT.sha256"
          ls -lh "$ARTIFACT"*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropic-${{ matrix.backend }}
          path: |
            entropic-*.tar.gz
            entropic-*.tar.gz.sha256

  # ──────────────────────────────────────────────────────────────────
  # Collect all matrix artifacts and publish one GitHub Release.
  # Failure of any build-package job aborts publish (default needs:
  # semantics — we don't want partial releases).
  # ──────────────────────────────────────────────────────────────────
  github-release:
    name: Publish GitHub Release
    needs: [validate-tag, build-package]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/entropic-*.tar.gz
            artifacts/entropic-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark RCs as prerelease so consumers don't auto-upgrade.
          prerelease: ${{ contains(needs.validate-tag.outputs.version, '-') }}

  # ── Python wheel + PyPI publish ──────────────────────────────────
  # DEFERRED to v2.1.1 — see .claude/proposals/BACKLOG/v2.1.1-python-wrapper.md.
  #
  # v2.0.5 ships the C/C++ distribution only (tarballs + install.sh).
  # Python wrapper needs architectural decisions around:
  #   - Fat wheel vs index-URL pattern vs on-demand .so download
  #   - PyPI 100 MB per-file limit (exemption request required for CUDA)
  #   - CUDA runtime bundling vs host prerequisite
  #   - CLI surface: native-binary execv shim vs click duplicate
  #
  # entropic-engine v1.7.1 remains on PyPI (Python-only engine). It
  # is NOT overwritten by v2.0.5. Future v2.x.y will be a clean
  # redesign of the Python packaging story.
  # ──────────────────────────────────────────────────────────────────
