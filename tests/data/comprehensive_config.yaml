# SPDX-License-Identifier: Apache-2.0
# Comprehensive coverage fixture (v2.3.10).
#
# Touches every parse_* branch in src/config/loader.cpp so a single
# load_config_from_string call exercises:
#   - models (default + router + multiple tiers w/ mmproj)
#   - routing (enabled + classification_prompt + tier_map + handoff_rules)
#   - compaction (every field)
#   - permissions (allow + deny + auto_approve)
#   - mcp (every enable_* + nested filesystem + nested external)
#   - generation
#   - lsp
#   - inference.prompt_cache + inference.speculative (incl. nested draft)
#   - constitutional_validation
#   - scalar fields (log_level, vram_reserve_mb, paths)
#   - tri-state path fields (constitution, app_context)

log_level: WARN
inject_model_context: true
vram_reserve_mb: 512
ggml_logging: true
llama_log_path: "/tmp/llama-custom.log"
console_logging: false
constitution: /tmp/entropic-test-constitution.md
app_context: /tmp/entropic-test-app-context.md

models:
  default: lead
  router:
    path: primary
    adapter: qwen35
    context_length: 8192
    gpu_layers: 0
  lead:
    path: primary
    adapter: qwen35
    context_length: 131072
    gpu_layers: 40
    keep_warm: true
    use_mlock: true
    reasoning_budget: 2000
    cache_type_k: q8_0
    cache_type_v: q8_0
    n_batch: 1024
    n_ubatch: 256
    n_threads: 8
    tensor_split: "0.5,0.5"
    split_mode: "row"
    main_gpu: 1
    offload_kqv: false
    rope_freq_base: 100000.0
    rope_freq_scale: 0.5
    n_parallel: 4
    flash_attn: true
    allowed_tools:
      - filesystem.read_file
      - filesystem.list_dir
    mmproj: primary
  eng:
    path: primary
    adapter: qwen35
    context_length: 65536
    gpu_layers: 20

routing:
  enabled: true
  fallback_tier: lead
  classification_prompt: "Pick the right tier for this prompt."
  tier_map:
    code: eng
    chat: lead
  handoff_rules:
    eng:
      - lead
      - eng
    lead:
      - lead

compaction:
  enabled: true
  threshold_percent: 0.8
  preserve_recent_turns: 5
  summary_max_tokens: 512
  notify_user: true
  save_full_history: true
  tool_result_ttl: 10
  warning_threshold_percent: 0.6

permissions:
  allow:
    - filesystem.read_file
    - git.status
  deny:
    - bash.execute
  auto_approve: true

mcp:
  enable_entropic: true
  enable_filesystem: true
  enable_bash: false
  enable_git: true
  enable_diagnostics: true
  enable_web: true
  server_timeout_seconds: 30
  working_dir: /tmp/entropic-test-mcp-workdir
  filesystem:
    diagnostics_on_edit: true
    fail_on_errors: false
    diagnostics_timeout: 10
    allow_outside_root: true
    max_read_context_pct: 0.5
    max_read_bytes: 65536
  external:
    enabled: true
    rate_limit: 100
    socket_path: /tmp/entropic-test-external.sock
    ask_streaming: false

generation:
  max_tokens: 2048
  default_temperature: 0.5
  default_top_p: 0.85

lsp:
  enabled: true
  python_enabled: true
  c_enabled: false

inference:
  prompt_cache:
    enabled: false
    log_hits: false
    max_bytes: 268435456
  speculative:
    enabled: true
    n_draft: 8
    draft:
      path: primary
      adapter: qwen35
      context_length: 4096
      gpu_layers: 0
      n_threads: 4
      flash_attn: false

constitutional_validation:
  enabled: true
  max_revisions: 2
  max_critique_tokens: 256
  temperature: 0.2
  enable_thinking: false
  priority: 50
  grammar_key: constitutional
  skip_tiers:
    - eng
