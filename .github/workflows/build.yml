name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-cpu:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Full history for select_tests.py diff

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential doxygen

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENTROPIC_CPU_ONLY=ON \
            -DENTROPIC_BUILD_TESTS=ON \
            -DENTROPIC_BUILD_DOCS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Select tests (PR only)
        id: select
        if: github.event_name == 'pull_request'
        run: |
          CMD=$(python scripts/select_tests.py \
            --diff-against origin/${{ github.base_ref }} \
            --build-dir build \
            --verbose 2>&1 | tail -1)
          echo "ctest_cmd=$CMD" >> "$GITHUB_OUTPUT"
          echo "Selected: $CMD"

      - name: Test (PR — selected)
        if: github.event_name == 'pull_request' && steps.select.outputs.ctest_cmd != ''
        run: ${{ steps.select.outputs.ctest_cmd }}

      - name: Test (push — full suite)
        if: github.event_name == 'push'
        run: cd build && ctest --output-on-failure --parallel 4

      - name: Docs (Release only)
        if: matrix.build_type == 'Release'
        run: cmake --build build --target docs

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang-tidy-18 cppcheck

      - name: Configure with clang-tidy
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy-18" \
            -DENTROPIC_CPU_ONLY=ON \
            -DENTROPIC_BUILD_TESTS=OFF

      - name: Build (clang-tidy runs during build)
        run: cmake --build build --parallel

      - name: cppcheck
        run: |
          cppcheck --enable=warning,style,performance \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            -I include \
            src/

      - name: knots (C complexity checker)
        run: |
          pip install knots
          knots check src/ \
            --cognitive-complexity 15 \
            --cyclomatic-complexity 15 \
            --nesting-depth 4 \
            --sloc 50 \
            --abc-magnitude 10.0 \
            --max-returns 3 \
            --exclude "extern/*"
