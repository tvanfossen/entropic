name: CI

# PR + push checks on develop/main.
#
# Runs the project's authoritative quality gate — the full pre-commit
# suite, which itself invokes `inv build --cpu`, `inv test --cpu`, and
# the per-library coverage check. That keeps the CI signal identical
# to what contributors see locally before committing.
#
# Runs on GitHub-hosted ubuntu-24.04. There is no self-hosted runner
# registered on this repo. CPU build + unit tests + distribution smoke
# is the PR gate; CUDA artifact builds live in release.yml (also on
# ubuntu-24.04, with the CUDA toolkit installed inline).
#
# Model tests do not run in CI — they are developer-run at x.y.0 bumps
# per docs/architecture-cpp.md §Test Gating.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit (knots, flake8, doxygen-guard, build, tests, coverage)
    runs-on: ubuntu-24.04
    # 2-core hosted runner: cold-cache llama.cpp build dominates. First
    # run fills ccache (~20-30 min); subsequent runs hit it (~5-10 min).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # llama.cpp submodule is required for the CPU build.
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          ccache-key: cpu

      - name: Run pre-commit (all hooks, all files)
        run: .venv/bin/pre-commit run --all-files --show-diff-on-failure

      - name: ccache stats (post-build)
        if: always()
        run: ccache --show-stats

      - name: Upload per-library coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: test-reports/coverage/
          if-no-files-found: ignore

  distribution-smoke:
    name: Distribution smoke (find_package + CLI RPATH)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-entropic
        with:
          ccache-key: cpu

      - name: Run scripts/smoke_distribution.sh
        # Builds a clean shared CPU install, stages it to a scratch
        # prefix, then builds+runs packaging/smoke-consumer against it
        # via find_package(entropic). Confirms the Phase 1 packaging
        # story still works for external consumers.
        run: scripts/smoke_distribution.sh
