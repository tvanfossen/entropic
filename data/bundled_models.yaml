# ── Nemotron 3 (NVIDIA Open Model License — review) ───────────
# Hybrid Mamba-Transformer (nemotron_h GGUF arch). llama.cpp support
# is integrated via llm_build_mamba_base — Nemotron arch-verification
# gate passed at session start (see proposal Implementation Log).
# Tool-call format: qwen3_coder XML (same as Qwen3.5/3.6).
# Reasoning: emits <think>/</think> as separate special tokens —
# handled by ChatAdapter::strip_think_blocks.
#
# Multimodal status at the current pin (v2.1.12, gh#51): TEXT-ONLY.
# llama.cpp has `PROJECTOR_TYPE_NEMOTRON_V2_VL` (for v2-family vision)
# but no `PROJECTOR_TYPE_NEMOTRON_V3_*` exists at pin `253ba110b` —
# Nemotron-3-Nano-4B has no companion mmproj to bundle. Closing the
# multimodal coverage gap here would require an upstream change first.

nemotron3_nano_4b:
  name: NVIDIA-Nemotron-3-Nano-4B-UD-Q4_K_XL
  url: https://huggingface.co/unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF/resolve/main/NVIDIA-Nemotron-3-Nano-4B-UD-Q4_K_XL.gguf
  size_gb: 3.1
  provider: unsloth
  family: nemotron3
  size_label: nano_4b
  quant: UD-Q4_K_XL
  adapter: nemotron3
  description: Nemotron 3 Nano 4B — hybrid Mamba, reasoning-capable, edge class
  # License: NVIDIA Open Model License
  # (https://developer.download.nvidia.com/licenses/nvidia-open-model-license-agreement-june-2024.pdf).
  # Review before redistribution.
  # Quant rationale: UD-Q4_K_XL (Unsloth Dynamic, 3.13 GB) — better
  # quality-per-byte than bare Q4_K_M on reasoning-heavy small
  # models, with VRAM headroom for the hybrid-Mamba state cache.
  # NVFP4 / TurboQuant are not in this GGUF repo and would require
  # a separate (TensorRT-LLM-class) backend; the GGML path here
  # uses standard llama.cpp K/UD quants only.
