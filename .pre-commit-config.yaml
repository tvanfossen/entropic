# SPDX-License-Identifier: Apache-2.0
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      # ruff lint config lives here, not pyproject.toml — pre-commit
      # is the source of truth for hooks. Adjust here if rules change.
      - id: ruff
        args:
          - --fix
          - --line-length=100
          - --select=E,F,W,I,N,UP,B,C4
          - --ignore=E501
          - --extend-exclude=vendor,python/src/entropic/_bindings.py,python/src/entropic/_bindings_manifest.py
      - id: ruff-format
        # v2.2.1: _bindings.py + _bindings_manifest.py are auto-generated;
        # format is the generator's responsibility. ruff-format reflowing
        # them would break the inv gen-bindings --check drift detector.
        exclude: '^(vendor/|python/src/entropic/_bindings(_manifest)?\.py$)'
        args:
          - --line-length=100

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        # v2.2.1: skip auto-generated bindings — style is the generator's
        # responsibility, and reformatting them would break the drift check.
        exclude: '^python/src/entropic/_bindings(_manifest)?\.py$'
        additional_dependencies:
          - flake8-cognitive-complexity
          - flake8-functions
        args:
          - '--max-cognitive-complexity=15'
          - '--max-returns-amount=3'
          - '--max-line-length=100'
          - '--ignore=E501,W503,E203,E704,E266'

  # knots v1.4.3 carries both fixes we needed: #5 (args_override_self,
  # so the `args:` thresholds below override the entry's baked
  # defaults) and #6 (accept multiple FILE args, so pass_filenames
  # works under --all-files / multi-file commits). language:rust → CI
  # builds + runs it. exclude mirrors the doxygen-guard hook's scope
  # (extern is third-party; tests/build/etc. are exempt from the
  # quality gates).
  - repo: https://github.com/brandon-arrendondo/knots
    rev: v1.4.3
    hooks:
      - id: knots
        args:
          - --mccabe-threshold=15
          - --cognitive-threshold=15
          - --nesting-threshold=4
          - --sloc-threshold=50
          - --abc-threshold=20.0
          - --return-threshold=3
        exclude: ^(extern/|tests/|build/|\.build/|\.old/|\.venv/)

  - repo: https://github.com/tvanfossen/doxygen-guard
    rev: main
    hooks:
      - id: doxygen-guard
        files: \.(h|hpp|c|cpp|cc|cxx|py)$
        exclude: ^(extern/|tests/|build/|\.build/|\.old/|\.venv/)

  # ── Bindings drift (gh#55) ──────────────────────────
  - repo: local
    hooks:
      - id: gen-bindings-check
        name: Python bindings stay in sync with entropic.h
        # Re-runs the auto-generator and diffs against the committed
        # _bindings.py / _bindings_manifest.py. Fails loud (exit 1) when
        # an ENTROPIC_EXPORT or type typedef in the header is not
        # reflected in the wrapper — the gap that bit v2.1.10/11/12.
        # Fix: run ``inv gen-bindings`` and commit the regenerated files.
        entry: .venv/bin/inv gen-bindings --check
        language: system
        files: '^(include/entropic/.*\.h|python/src/entropic/_bindings(_manifest)?\.py|scripts/gen_bindings\.py)$'
        pass_filenames: false

  # ── Build & Test Gates ──────────────────────────────
  - repo: local
    hooks:
      - id: build
        name: Build (inv build --cpu)
        entry: .venv/bin/inv build --cpu
        language: system
        always_run: true
        pass_filenames: false

      - id: unit-tests
        name: Unit tests (inv test --cpu)
        entry: .venv/bin/inv test --cpu --no-build
        language: system
        always_run: true
        pass_filenames: false

      - id: coverage-check
        name: Per-library coverage (gcovr)
        # Per-library minimum line-coverage thresholds for librentropic
        # sub-targets. Format: "name:source_filter:percent". Adjust
        # numbers here, not in tasks.py — pre-commit-config.yaml is the
        # source of truth for hook gates.
        entry: .venv/bin/inv check-coverage
        language: system
        always_run: true
        pass_filenames: false
        args:
          - '--threshold'
          - 'librentropic-types:src/types/:95'
          - '--threshold'
          - 'librentropic-config:src/config/:90'
          - '--threshold'
          - 'librentropic-core:src/core/:85'
          - '--threshold'
          - 'librentropic-mcp:src/mcp/:85'
          - '--threshold'
          - 'librentropic-storage:src/storage/:85'
          - '--threshold'
          - 'librentropic-inference:src/inference/:70'
          - '--threshold'
          - 'librentropic-facade:src/facade/:70'
