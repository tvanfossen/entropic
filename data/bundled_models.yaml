  # License: Gemma Terms of Use. Quant: Q8_0.
  # Vision: paired mmproj — see gemma4_e4b_mmproj (v2.1.12, gh#51).
  mmproj_key: gemma4_e4b_mmproj

gemma4_e4b_mmproj:
